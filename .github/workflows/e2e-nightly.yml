name: E2E nightly smoke

# Audit H-19. Runs the API-only `*.smoke.spec.ts` Playwright suite
# against production every night at 03:00 UTC and fails loudly on any
# regression. Doesn't mutate prod state — only reads /health and
# /discover/clubs. Manual dispatch supports running against an
# arbitrary base URL for one-off validation (e.g. after a manual
# wrangler rollback to confirm the rolled-back version is live).

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: false
        default: 'https://cavaliq.com'

jobs:
  smoke:
    name: API smoke (${{ inputs.base_url || 'cavaliq.com' }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Playwright smoke suite
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || 'https://cavaliq.com' }}
          CI: true
        # `--project=api-smoke` filters to the API-only project that
        # doesn't need browser binaries — saves ~2 minutes of cold-
        # start vs. a full chromium install.
        run: pnpm --filter @equestrian/web exec playwright test --project=api-smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 14

      # Audit M-2: surface failures to the operator. Without a notification
      # path the founder won't see a degraded prod state until they check
      # the Actions tab manually. Open a GitHub issue tagged `incident,nightly`
      # so the standing notification rules light up.
      - name: Open incident issue on failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly E2E smoke failed — ${new Date().toISOString().slice(0, 10)}`,
              labels: ['incident', 'nightly'],
              body: [
                'The nightly E2E smoke run against prod failed.',
                '',
                `Run: ${runUrl}`,
                '',
                '## What to check',
                '- `/api/v1/health?deep=1` — DB + Redis subsystems',
                '- `/api/v1/discover/clubs` — paginated envelope',
                '',
                'Playwright report artifact is attached to the failed run.',
              ].join('\n'),
            });
