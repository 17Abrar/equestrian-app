name: CI

# Runs typecheck + lint + tests on every PR and on direct pushes to main.
# Required so type errors and lint regressions can't slip into the
# `cf:deploy` path â€” that script doesn't gate on either.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual trigger: `gh workflow run ci.yml` (or via the Actions tab UI).
  # Useful for re-running the neon-smoke job after adjusting secrets, or
  # for validating CI changes without opening a throwaway PR.
  workflow_dispatch:
    inputs:
      skip_neon:
        description: 'Skip the Neon test-branch smoke job'
        type: boolean
        default: false

# Cancel in-progress runs of the same workflow on the same ref. PRs only need
# the latest run; older ones are wasted CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck Â· lint Â· test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match `packageManager` field in root package.json so the lockfile
          # version matches what we install with locally.
          version: 10.20.0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck --filter='./apps/web' --filter='./apps/mobile' --filter='./packages/*'

      - name: Lint
        run: pnpm turbo lint --filter='./apps/web' --filter='./apps/mobile' --filter='./packages/*'

      # Mobile has no `test` script today â€” turbo silently skips packages
      # without the requested task, so this is a no-op for apps/mobile until
      # a test suite lands there.
      - name: Test
        run: pnpm turbo test --filter='./apps/web' --filter='./apps/mobile' --filter='./packages/*'

  neon-smoke:
    # Spins up an ephemeral Neon branch from `main`, applies all
    # migrations, and runs `scripts/test-neon-smoke.mjs` against it via
    # the real neon-http driver. Catches the ~1% of edge cases where
    # pglite (used by the in-process tests above) diverges from real
    # Postgres â€” Neon's HTTP single-statement enforcement, real
    # Postgres MVCC + CHECK-constraint behaviour, etc. The branch is
    # deleted at the end whether the smoke test passes or fails.
    name: neon test branch Â· smoke
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 10

    # Skip on pull_request from forks â€” they can't read repository
    # secrets, and Neon's create-branch-action would fail with no api_key.
    # Also skip when manually dispatched with skip_neon=true (e.g. when
    # re-running just to validate verify-job changes). Branches in this
    # repo and pushes to main still run.
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.skip_neon != true) ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Neon test branch
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          # Both NEON_PROJECT_ID and NEON_API_KEY are repo secrets â€” see
          # Settings â†’ Secrets and variables â†’ Actions â†’ Secrets. The
          # project id is masked from logs for the same reason as an
          # API key (audit H-21): together they're targeting info for
          # an attacker who got hold of a stolen Neon key elsewhere.
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: ci-${{ github.run_id }}-${{ github.run_attempt }}
          api_key: ${{ secrets.NEON_API_KEY }}
          # Neon Auth adds `authenticator` / `anonymous` / `authenticated`
          # roles alongside `neondb_owner`. The action errors out when it
          # sees multiple roles unless we pin one â€” pick the project owner
          # since that's what the app uses at runtime.
          username: neondb_owner

      - name: Apply migrations
        env:
          # Use the unpooled URL â€” pgbouncer rejects DDL on the pooled host.
          DATABASE_URL_UNPOOLED: ${{ steps.create-branch.outputs.db_url }}
        run: pnpm db:migrate:neon

      - name: Smoke test
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.db_url }}
        run: pnpm test:neon

      - name: Delete Neon test branch
        # `if: always()` so a failed smoke test still tears down the
        # branch â€” leaving orphans burns Neon compute hours.
        if: always() && steps.create-branch.outputs.branch_id != ''
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: ${{ steps.create-branch.outputs.branch_id }}
          api_key: ${{ secrets.NEON_API_KEY }}
